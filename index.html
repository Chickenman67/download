<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Download Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">⚡ Browser Download Manager</h1>
                <div class="header-controls">
                    <button id="settingsBtn" class="icon-btn" title="Settings">⚙️</button>
                </div>
            </div>
        </header>

        <!-- URL Input Section -->
        <section class="url-input-section">
            <div class="url-input-container">
                <input 
                    type="text" 
                    id="urlInput" 
                    class="url-input" 
                    placeholder="Paste download URL here or use clipboard..."
                    autocomplete="off"
                >
                <button id="pasteBtn" class="btn btn-secondary" title="Paste from clipboard">📋</button>
                <button id="addBtn" class="btn btn-primary">Add Download</button>
            </div>
            <div class="url-suggestions" id="urlSuggestions"></div>
        </section>

        <!-- Queue Controls -->
        <section class="queue-controls">
            <div class="controls-group">
                <button id="pauseAllBtn" class="btn btn-secondary">⏸ Pause All</button>
                <button id="resumeAllBtn" class="btn btn-secondary">▶ Resume All</button>
                <button id="clearCompleted" class="btn btn-secondary">🗑 Clear Completed</button>
            </div>
            <div class="queue-stats">
                <span id="activeCount">Active: 0</span>
                <span id="queueCount">Queued: 0</span>
                <span id="speedDisplay">Speed: --</span>
            </div>
        </section>

        <!-- Downloads List -->
        <section class="downloads-section">
            <div id="downloadsList" class="downloads-list">
                <div class="empty-state">
                    <p>No downloads yet. Add a URL to get started.</p>
                </div>
            </div>
        </section>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="maxWorkers">Max Parallel Streams:</label>
                    <input 
                        type="number" 
                        id="maxWorkers" 
                        min="1" 
                        max="16" 
                        value="4"
                    >
                    <small>Higher values = faster downloads (recommended: 4-8)</small>
                </div>

                <div class="setting-group">
                    <label for="chunkSize">Chunk Size (MB):</label>
                    <input 
                        type="number" 
                        id="chunkSize" 
                        min="1" 
                        max="100" 
                        value="10"
                    >
                    <small>Size of each parallel download chunk (5-50MB recommended)</small>
                </div>

                <div class="setting-group">
                    <label for="bandwidthLimit">Bandwidth Limit (Mbps):</label>
                    <input 
                        type="number" 
                        id="bandwidthLimit" 
                        min="0" 
                        value="0"
                    >
                    <small>0 = unlimited</small>
                </div>

                <div class="setting-group">
                    <label for="retryAttempts">Retry Attempts:</label>
                    <input 
                        type="number" 
                        id="retryAttempts" 
                        min="1" 
                        max="10" 
                        value="3"
                    >
                </div>

                <div class="setting-group checkbox">
                    <input 
                        type="checkbox" 
                        id="autoResume" 
                        checked
                    >
                    <label for="autoResume">Auto-resume on page reload</label>
                </div>

                <div class="setting-group checkbox">
                    <input 
                        type="checkbox" 
                        id="enableIndexedDB" 
                        checked
                    >
                    <label for="enableIndexedDB">Store downloads in IndexedDB (for larger files)</label>
                </div>

                <div class="info-box">
                    <strong>Storage Info:</strong>
                    <p id="storageInfo">Calculating...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="clearDataBtn" class="btn btn-danger">Clear All Data</button>
                <button id="closeSettingsBtn" class="btn btn-primary">Done</button>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters: DB → Engine → UI → Main) -->
    <script src="js/db.js"></script>
    <script src="js/download-engine.js"></script>
    <script src="js/download-item.js"></script>
    <script src="js/ui-manager.js"></script>
    <script src="js/clipboard-monitor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
